# Local tracker repo map for generated Cargo dependency overrides.
# Cargo does not read this file directly; run:
#
#   python tools\repo_map.py write-cargo-config
#

[standard]
version = 1
cargo_config = ".cargo/config.toml"

[repos.this_repo]
role = "current repository"
relative = "."
clone_url = "https://github.com/giodl73-repo/HUNT.git"

[repos.rally]
role = "tracker dependency for hunt"
relative = "..\\rally"
clone_url = "https://github.com/giodl73-repo/RALLY.git"
cargo_patches = [
  { package = "rally-core", source = "https://github.com/giodl73-repo/RALLY.git", path = "." },
]
